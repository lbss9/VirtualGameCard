services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=virtualgamecard;Username=postgres;Password=postgres
      Jwt__Secret: local-development-jwt-key-at-least-32-characters
      PaymentWebhook__Secret: local-development-webhook-secret-change-me
      Metrics__Enabled: "true"
      Features__AllowEmailVerificationSimulation: "true"
      Features__AllowPaymentSimulation: "true"
      Sqs__Enabled: "false"
      Sqs__Region: us-east-2
      Sqs__PaymentRequestedQueueUrl: https://sqs.us-east-2.amazonaws.com/212263949491/vgc-payment-requested
      Sqs__PaymentApprovedQueueUrl: https://sqs.us-east-2.amazonaws.com/212263949491/vgc-payment-approved
      Sqs__PaymentProcessingDelaySeconds: "30"
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:5174
      Cors__AllowedOrigins__2: http://127.0.0.1:5173
      Cors__AllowedOrigins__3: http://127.0.0.1:5174
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: virtualgamecard
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.7.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:12.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
