services:
  - type: web
    name: virtualgamecard-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Jwt__Issuer
        value: virtualgamecard-api
      - key: Jwt__Audience
        value: virtualgamecard-web
      - key: Jwt__AccessTokenMinutes
        value: 15
      - key: Jwt__Secret
        sync: false
      - key: PaymentWebhook__Secret
        sync: false
      - key: Sqs__Enabled
        value: false
      - key: Sqs__Region
        value: us-east-2
      - key: Sqs__PaymentRequestedQueueUrl
        value: https://sqs.us-east-2.amazonaws.com/212263949491/vgc-payment-requested
      - key: Sqs__PaymentApprovedQueueUrl
        value: https://sqs.us-east-2.amazonaws.com/212263949491/vgc-payment-approved
      - key: Sqs__PaymentProcessingDelaySeconds
        value: 30
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ConnectionStrings__Default
        sync: false
      - key: Cors__AllowedOrigins__0
        value: https://lbss9.github.io
